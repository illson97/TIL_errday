<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript DOM</title>
  <style>
    .box {
      height: 300px;
      width: 300px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      font-weight: 900;
      margin: 1rem
    }

    .blue {
      background-color: lightblue;
    }

    .green {
      background-color: lightgreen;
    }

    .red {
      background-color: lightcoral;
    }

    .black {
      background-color: black;
    }

    .pink {
      background-color: lightpink;
    }

    .circle {
      border-radius: 50%;
    }

    .border-2 {
      border-width: 2px;
    }

    .border-dashed {
      border-style: dashed;
    }

    .border-black {
      border-color: black;
    }
    .white {
        background-color: white;
    }
    .yellow {
        background-color: lightyellow;
    }
  </style>
</head>

<body>
  <div>
    <div class="blue">blue</div>
    <div class="box green box2">green</div>
    <div class="box red">black</div>
    <div id="yellow" class="box">yellow</div>
    <div class="box black">black</div>
    <div id="pink">pink</div>
  </div>
</body>

<script>
  // DOM м„ нғқ л°Ҹ мЎ°мһ‘ 
  // 1. classк°Җ blueмқё мҡ”мҶҢм—җ box нҒҙлһҳмҠӨ м¶”к°Җ
    const h1tag = document.querySelector('.blue')
    h1tag.classList.add('box')
    console.log(document.querySelector('.blue'))
  // 2. classк°Җ box2мқё мҡ”мҶҢмқҳ box2 нҒҙлһҳмҠӨ м ңкұ°
    const h2tag = document.querySelector('.box2')
    h2tag.classList.remove('box2')
    console.log(document.querySelector('.green'))
  // 3. classк°Җ redмқё мҡ”мҶҢмқҳ н…ҚмҠӨнҠёлҘј redлЎң ліҖкІҪ
    const h3tag = document.querySelector('.red')
    h3tag.textContent= 'red'
    console.log(document.querySelector('.red'))
  // 4. classк°Җ blackмқё мҡ”мҶҢмқҳ colorлҘј whiteлЎң ліҖкІҪ
    const h4tag = document.querySelector('.black')
    h4tag.classList.add('white')
    h4tag.classList.remove('black')
    console.log(document.querySelector('.white'))
  // 5. idк°Җ yellowмқё мҡ”мҶҢмқҳ background-colorлҘј lightyellowлЎң ліҖкІҪ
    const h5tag = document.getElementById("yellow")
    h5tag.classList.add('yellow')
    console.log(document.querySelector('.yellow'))
  // 6. idк°Җ pinkмқё мҡ”мҶҢмқҳ нҒҙлһҳмҠӨлҘј box pink circle border-2 border-dashed border-blackлЎң м„Өм •
    const h6tag = document.getElementById("pink")
    h6tag.classList.add('box', 'border-2', 'border-dashed', 'border-black', 'circle', 'pink')
    console.log(document.querySelector('.pink'))
</script>

</html>
